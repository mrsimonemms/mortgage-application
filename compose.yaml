services:
  worker:
    build:
      context: .
      dockerfile: ./apps/golang.Dockerfile
      target: dev
      args:
        APP: worker
    environment:
      LOG_LEVEL: debug
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - 9000:9000
    volumes:
      - ./apps/worker:/go/root/apps/worker
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/health || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 3

  #####################
  # External services #
  #####################
  temporal:
    image: temporalio/temporal
    ports:
      - 8233:8233
    command: server start-dev --ip 0.0.0.0
    healthcheck:
      test: [ "CMD-SHELL", "temporal operator cluster health" ]
      interval: 10s
      timeout: 10s
      retries: 3
